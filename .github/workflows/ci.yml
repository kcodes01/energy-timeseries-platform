name: Energy Platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Style Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ruff sqlfluff

      - name: Lint Python with ruff
        run: |
          ruff check pipeline/

      - name: Lint SQL with sqlfluff
        run: |
          sqlfluff lint dbt_project/models/ --dialect clickhouse

  test:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v

  dbt_compile:
    name: dbt Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-core==1.7.19 dbt-clickhouse==1.7.3

      - name: dbt compile
        run: |
          cd dbt_project
          dbt compile --profiles-dir .
        env:
          DBT_CLICKHOUSE_HOST: localhost
          DBT_CLICKHOUSE_PORT: 8123
          DBT_CLICKHOUSE_USER: default
          DBT_CLICKHOUSE_PASSWORD: ""
